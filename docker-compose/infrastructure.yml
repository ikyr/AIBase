version: '3.8'

# ===============================
# AIBase 基础设施
# ===============================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aibase-pg
    environment:
      POSTGRES_DB: ${PG_DB:-aibase}
      POSTGRES_USER: ${PG_USER:-aibase}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?}
    ports:
      - "${PG_EXPOSE_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-aibase}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aibase-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: aibase-nacos
    hostname: nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: aibase-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2024-11-07T04-07-41Z
    container_name: aibase-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"

  milvus:
    image: milvusdb/milvus:v2.4.1
    container_name: aibase-milvus
    command: milvus run standalone
    restart: unless-stopped
    ports:
      - "19530:19530"
      - "9091:9091"
    # Note: restart: unless-stopped may mask persistent failures in dev.
    # Consider using a deployment orchestrator health-check + alerting in production.
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      - etcd
      - minio

  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: aibase-rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: aibase-rocketmq-broker
    command: sh mqbroker -n rocketmq-namesrv:9876
    ports:
      - "10911:10911"
    depends_on:
      - rocketmq-namesrv

  tempo:
    image: grafana/tempo:2.6.1
    container_name: aibase-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "4317:4317"
      - "3200:3200"

  loki:
    image: grafana/loki:3.1.2
    container_name: aibase-loki
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: aibase-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  pg_data:
  redis_data:
  tempo_data:
  grafana_data:
